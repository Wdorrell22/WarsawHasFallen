
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warsaw Has Fallen (2052)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <script>
      // Shim process for browser environment
      window.process = {
        env: {
          API_KEY: '' // The user must provide this or it will be injected by the environment
        }
      };

      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'term-bg': '#050505',
              'term-amber': '#ffb000',
              'term-amber-dim': '#996900',
              'term-red': '#cc2200',
              'term-dark-red': '#550000',
              'term-gray': '#333333',
              'term-grid': '#111111',
              'term-frame': '#1a1a1a',
            },
            fontFamily: {
              mono: ['"Share Tech Mono"', 'monospace'],
              display: ['"VT323"', 'monospace'],
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glitch': 'glitch 1s linear infinite',
              'scan': 'scan 8s linear infinite',
            },
            backgroundImage: {
              'hex-pattern': 'radial-gradient(#1a1a1a 1px, transparent 1px)',
            }
          },
        },
      }
    </script>
    <style>
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll, handle inside app */
        background-color: #050505;
        background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        color: #ffb000;
        direction: ltr; /* Force Left-to-Right text direction */
        text-align: left;
      }

      /* Noise Texture */
      .bg-noise {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      
      /* Moving Scanline */
      .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 3px, 3px 100%;
        pointer-events: none;
        z-index: 40;
      }

      .scanline-bar {
        position: absolute;
        width: 100%;
        height: 5px;
        background: rgba(255, 255, 255, 0.1);
        opacity: 0.4;
        animation: scan 6s linear infinite;
        pointer-events: none;
        z-index: 41;
      }

      @keyframes scan {
        0% { top: -20px; }
        100% { top: 100%; }
      }

      /* CRT Effects */
      .crt-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9) 100%);
        pointer-events: none;
        z-index: 46;
      }

      /* Screen Crack Overlay */
      .screen-crack {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        opacity: 0.3;
        background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M80 10 L70 30 L75 35 L60 50 L65 55' stroke='rgba(255,255,255,0.3)' stroke-width='0.2' fill='none'/%3E%3Cpath d='M10 80 L30 70 L35 75 L50 60' stroke='rgba(255,255,255,0.2)' stroke-width='0.1' fill='none'/%3E%3C/svg%3E");
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
        border: 1px solid #222;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border: 1px solid #666;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      .glow-text {
        text-shadow: 0 0 5px currentColor;
      }
      
      .tech-border {
        position: relative;
        background: rgba(0,0,0,0.8);
        border: 1px solid currentColor;
      }
      .tech-border::before {
        content: '';
        position: absolute;
        top: -1px; left: -1px;
        width: 8px; height: 8px;
        border-top: 2px solid currentColor;
        border-left: 2px solid currentColor;
      }
      .tech-border::after {
        content: '';
        position: absolute;
        bottom: -1px; right: -1px;
        width: 8px; height: 8px;
        border-bottom: 2px solid currentColor;
        border-right: 2px solid currentColor;
      }

      .chamfer {
        clip-path: polygon(
          15px 0, 100% 0, 
          100% calc(100% - 15px), calc(100% - 15px) 100%, 
          0 100%, 0 15px
        );
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="bg-noise"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
